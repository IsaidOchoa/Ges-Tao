      <!-- TÍTULO Y DESCRIPCIÓN AGRUPADOS -->

          <i class="fa-solid fa-clock-rotate-left"></i> Bitácora de Operaciones
        </h3>
        <!-- La descripción se movió aquí, justo debajo del título -->

          Registro detallado de operaciones realizadas en el sistema.
        </p>
      </div>
      <!-- FIN TÍTULO Y DESCRIPCIÓN -->
      
      <!-- Buscador Global (Intacto) -->
      <div style="position:relative; width: 300px;">
        <i class="fa-solid fa-search" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted);"></i>
        <input type="text" id="buscador-historial" placeholder="Buscar por folio, nombre, acción..." 
          style="width:100%; padding:10px 10px 10px 35px; border:1px solid var(--border-color); border-radius:var(--radius-sm); background:var(--bg-white); color:var(--text-dark);">

    <div class="table-responsive">
      <table class="data-table">

          <tr>
            <th style="width:180px;">FECHA Y HORA</th>
            <th>USUARIO / ACCIÓN</th>

<!-- Estilos (Intactos) -->
<style>
  /* Estilos específicos para badges de auditoría */
  .badge-audit {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .audit-emission { background: #e3f2fd; color: #1565c0; }
  .audit-login { background: #e8f5e9; color: #2e7d32; }
  .audit-delete { background: #ffebee; color: #c62828; }
  .audit-edit { background: #fff3e0; color: #ef6c00; }
  
  .audit-details { font-size: 0.9rem; color: var(--text-dark); }
  .audit-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; display: block; }
  
  body[data-theme="dark"] .audit-emission { background: #0d47a1; color: #bbdefb; }
  body[data-theme="dark"] .audit-login { background: #1b5e20; color: #c8e6c9; }
  body[data-theme="dark"] .audit-delete { background: #b71c1c; color: #ffcdd2; }
  body[data-theme="dark"] .audit-edit { background: #e65100; color: #ffe0b2; }
</style>

<!-- Script (Intacto) -->
<script>
  let historialData = [];

  async function cargarHistorial() {
    const tbody = document.getElementById('tabla-historial-body');
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Cargando bitácora...</td></tr>';

    try {
      const resp = await window.electronAPI.obtenerHistorial();
      if (resp.success) {
        historialData = resp.data;
        renderizarTabla(historialData);
      } else {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">Error: ${resp.error}</td></tr>`;
      }
    } catch (e) {
      console.error(e);
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">Error de conexión</td></tr>';
    }
  }

  function renderizarTabla(datos) {
    const tbody = document.getElementById('tabla-historial-body');
    const noResults = document.getElementById('no-results');
    tbody.innerHTML = '';

    if (datos.length === 0) {
      noResults.style.display = 'block';
      return;
    } else {
      noResults.style.display = 'none';
    }

    datos.forEach(row => {
      let badgeClass = 'audit-edit';
      let accionLabel = row.accion;
      
      if (row.accion.includes('EMITIR')) { badgeClass = 'audit-emission'; accionLabel = 'Emisión de Constancia'; }
      else if (row.accion.includes('LOGIN')) { badgeClass = 'audit-login'; accionLabel = 'Inicio de Sesión'; }
      else if (row.accion.includes('ELIMINAR')) { badgeClass = 'audit-delete'; accionLabel = 'Eliminación de Registro'; }
      else if (row.accion.includes('GUARDAR') || row.accion.includes('ACTUALIZAR')) { badgeClass = 'audit-edit'; accionLabel = 'Actualización de Datos'; }

      let detallesHtml = `<span class="audit-details">${row.tabla_afectada || 'Sistema'}</span>`;
      
      if (row.folio) {
        const nombreDocente = row.nombres ? `${row.nombres} ${row.apellido_paterno || ''}` : 'Desconocido';
        detallesHtml += `<span class="audit-meta">Docente: <strong>${nombreDocente}</strong></span>`;
        if(row.tipo_constancia) {
          detallesHtml += `<span class="audit-meta">Tipo: ${row.tipo_constancia.replace('_', ' ')}</span>`;
        }
      } else if (row.detalles) {
        try {
          const json = JSON.parse(row.detalles);
          if(json.nombre) detallesHtml += `<span class="audit-meta">Objeto: ${json.nombre}</span>`;
        } catch(e) {}
      }

      const fecha = new Date(row.fecha_sistema).toLocaleString('es-MX', { 
        day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' 
      });

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="font-size:0.85rem; color:var(--text-muted);">${fecha}</td>
        <td>
          <span class="badge-audit ${badgeClass}">${accionLabel}</span>
        </td>
        <td>${detallesHtml}</td>
        <td style="font-family:monospace; font-weight:bold; color:var(--primary-color);">
          ${row.folio || '-'}
        </td>
        <td style="text-align:right;">
          <i class="fa-solid fa-check-circle" style="color:var(--success-color);"></i>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  const buscador = document.getElementById('buscador-historial');
  if(buscador) {
    buscador.addEventListener('input', (e) => {
      const texto = e.target.value.toLowerCase();
      const filtrados = historialData.filter(row => {
        const matchAccion = row.accion.toLowerCase().includes(texto);
        const matchTabla = (row.tabla_afectada || '').toLowerCase().includes(texto);
        const matchFolio = (row.folio || '').toLowerCase().includes(texto);
        const matchNombre = (row.nombres || '').toLowerCase().includes(texto) || 
                             (row.apellido_paterno || '').toLowerCase().includes(texto);
        const matchDetalles = (row.detalles || '').toLowerCase().includes(texto);
        return matchAccion || matchTabla || matchFolio || matchNombre || matchDetalles;
      });
      renderizarTabla(filtrados);
    });
  }

  cargarHistorial();
</script>
