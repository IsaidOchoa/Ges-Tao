<!-- Script para manejar el dropdown -->
<script>
  // Función global para toggle del dropdown
  window.toggleCatalogosDropdown = function(event) {
    if (event) event.stopPropagation();
    
    const dropdown = document.getElementById('catalogos-dropdown');
    const parent = document.querySelector('.has-dropdown');
    
    if (dropdown && parent) {
      dropdown.classList.toggle('hidden');
      parent.classList.toggle('expanded');
      
      // Rotar la flecha
      const indicator = parent.querySelector('.dropdown-indicator i');
      if (indicator) {
        if (dropdown.classList.contains('hidden')) {
          indicator.style.transform = 'rotate(0deg)';
        } else {
          indicator.style.transform = 'rotate(90deg)';
        }
      }
    }
  };
  
  // Cerrar dropdown al hacer clic fuera
  document.addEventListener('click', function(event) {
    const dropdown = document.getElementById('catalogos-dropdown');
    const parent = document.querySelector('.has-dropdown');
    
    if (dropdown && parent && 
        !dropdown.contains(event.target) && 
        !parent.contains(event.target)) {
      dropdown.classList.add('hidden');
      parent.classList.remove('expanded');
      
      const indicator = parent.querySelector('.dropdown-indicator i');
      if (indicator) {
        indicator.style.transform = 'rotate(0deg)';
      }
    }
  });
</script>
