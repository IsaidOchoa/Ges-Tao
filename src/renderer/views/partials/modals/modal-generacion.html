<!-- src/renderer/views/partials/modals/modal-generacion.html -->
<div id="modal-generacion" class="modal-overlay hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modal-generacion-title">Nueva Generación</h3>
      <button class="btn-close" id="btn-cerrar-modal-generacion">&times;</button>
    </div>
    
    <form id="form-generacion">
      <input type="hidden" id="generacion-id">
      
      <div class="form-group">
        <label>Clave *</label>
        <input type="text" id="generacion-clave" required placeholder="Ej: GEN-2024-A">
      </div>
      
      <div class="form-group">
        <label>Nombre *</label>
        <input type="text" id="generacion-nombre" required placeholder="Ej: Generación 2024-2028">
      </div>
      
      <div class="form-group">
        <label>Plan de Estudio *</label>
        <select id="generacion-plan" required>
          <option value="">Seleccionar...</option>
          <!-- Se llena dinámicamente -->
        </select>
      </div>
      
      <div class="form-group">
        <label>Periodo de Ingreso *</label>
        <select id="generacion-periodo" required>
          <option value="">Seleccionar...</option>
          <!-- Se llena dinámicamente -->
        </select>
      </div>
      
      <input type="hidden" id="generacion-estado" value="activa">
    </form>
    
    <div class="modal-footer">
      <button class="btn btn-cancel" id="btn-cancelar-generacion">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-generacion">Guardar Generación</button>
    </div>
  </div>
</div>
