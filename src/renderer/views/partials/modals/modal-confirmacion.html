<div id="modal-confirmacion" class="modal-overlay hidden">
  <div class="modal-content modal-sm">
    <div class="modal-header">
      <h3>Confirmación</h3>
      <button class="btn-close" id="btn-cerrar-confirmacion">&times;</button>
    </div>
    <div class="modal-body">
      <p id="confirmacion-mensaje" style="margin: 20px 0; text-align: center; font-size: 1.05rem;"></p>
    </div>
    <div class="modal-footer" style="justify-content: center; gap: 12px;">
      <button class="btn btn-secondary" id="btn-confirmacion-cancelar">Cancelar</button>
      <button class="btn btn-primary" id="btn-confirmacion-aceptar">Aceptar</button>
    </div>
  </div>
</div>
