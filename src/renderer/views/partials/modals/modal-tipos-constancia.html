<!-- MODAL TIPO DE CONSTANCIA (SIMPLIFICADO) -->
<div id="modal-tipo-constancia" class="modal-overlay hidden">
  <div class="modal-content smaller">
    <div class="modal-header">
      <h3 id="modal-titulo-tipo">Nuevo Tipo de Constancia</h3>
      <button class="btn-close" onclick="cerrarModal('modal-tipo-constancia')">&times;</button>
    </div>
    <div class="modal-body">
      <form id="form-tipo-constancia">
        <input type="hidden" id="tipo-id">
        
        <!-- Campo Nombre (Único obligatorio) -->
        <div class="form-group">
          <label>Nombre del Tipo *</label>
          <input type="text" id="tipo-nombre" required placeholder="Ej. Participación como Docente" autofocus>
          <small style="color:var(--text-muted); font-size:0.8rem; margin-top:4px; display:block;">
            La clave única se generará automáticamente.
          </small>
        </div>
        
        <!-- Campo Descripción -->
        <div class="form-group">
          <label>Descripción (Opcional)</label>
          <textarea id="tipo-descripcion" rows="3" placeholder="Breve descripción de uso..."></textarea>
        </div>

        <!-- Configuración de Requisitos (Opcional pero útil) -->
        <div style="margin-top: 15px; padding-top:15px; border-top:1px solid var(--border-color);">
          <label style="font-weight:600; font-size:0.9rem; color:var(--text-dark); display:block; margin-bottom:10px;">
            ¿Qué datos requiere este tipo?
          </label>
          <div class="form-row-flex">
            <div class="form-group flex-1">
              <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-weight:normal;">
                <input type="checkbox" id="tipo-requiere-ee">
                <span>Requiere Materia (EE)</span>
              </label>
            </div>
            <div class="form-group flex-1">
              <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-weight:normal;">
                <input type="checkbox" id="tipo-requiere-periodo">
                <span>Requiere Periodo</span>
              </label>
            </div>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="cerrarModal('modal-tipo-constancia')">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-tipo-constancia">Guardar</button>
    </div>
  </div>
</div>
