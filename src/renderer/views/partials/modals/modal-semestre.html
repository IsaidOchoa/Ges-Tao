<!-- src/renderer/views/partials/modals/modal-semestre.html -->
<div id="modal-semestre" class="modal-overlay hidden">
  <div class="modal-content">
    
    <!-- Header -->
    <div class="modal-header">
      <h3 id="modal-semestre-title">Nuevo Semestre Académico</h3>
      <button class="btn-close" id="btn-cerrar-modal-semestre">&times;</button>
    </div>
    
    <!-- Formulario -->
    <form id="form-semestre">
      <!-- Campo oculto para ID (edición) -->
      <input type="hidden" id="semestre-id">
      
      <!-- Orden -->
      <div class="form-group">
        <label>Orden Académico *</label>
        <input type="number" id="semestre-orden" name="orden" required min="1" max="14" placeholder="Ej: 1">
        <small class="form-hint">Posición en la malla (1° a 14°)</small>
      </div>

      <!-- Nombre -->
      <div class="form-group">
        <label>Nombre *</label>
        <input type="text" id="semestre-nombre" name="nombre" required placeholder="Ej: Primer Semestre">
      </div>

      <!-- Clave (auto-generada) -->
      <div class="form-group">
        <label>Clave</label>
        <input type="text" id="semestre-clave" name="clave" readonly 
               class="form-control-readonly"
               placeholder="Se genera automáticamente (Ej: S1)">
      </div>

      <!-- Estado (oculto en modal, gestionado desde tabla) -->
      <input type="hidden" id="semestre-estado" value="activo">
    </form>
    
    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn btn-cancel" id="btn-cancelar-semestre">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-semestre">Guardar Semestre</button>
    </div>
    
  </div>
</div>
