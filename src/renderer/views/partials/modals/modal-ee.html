<!-- MODAL EXPERIENCIA EDUCATIVA (Layout 2 Columnas) -->
<div id="modal-ee" class="modal-overlay hidden">
  <div class="modal-content modal-ee-2col">
    <!-- Header -->
    <div class="modal-header">
      <h3 id="modal-titulo-ee">Nueva Experiencia Educativa</h3>
      <button class="btn-close" id="btn-cerrar-modal-ee" title="Cerrar">&times;</button>
    </div>

    <!-- Formulario -->
    <form id="form-ee">
      <input type="hidden" id="ee-id" />

      <!-- GRID DE 2 COLUMNAS -->
      <div class="ee-form-grid">
        
        <!-- COLUMNA IZQUIERDA: Datos principales -->
        <div class="ee-col-left">
          
          <div class="form-group">
            <label>Clave EE *</label>
            <input type="text" id="ee-clave" required placeholder="Ej: MSC-101" />
            <small class="help-text">Código único de la experiencia educativa</small>
          </div>

          <div class="form-group">
            <label>Nombre *</label>
            <input type="text" id="ee-nombre" required placeholder="Ej: Metodología de la Investigación" />
          </div>

          <div class="form-group">
            <label>Tipo *</label>
            <select id="ee-tipo" required>
              <option value="">Seleccione...</option>
              <option value="Obligatoria">Obligatoria</option>
              <option value="Optativa">Optativa</option>
              <option value="Taller">Taller</option>
            </select>
          </div>

          <div class="form-group">
            <label>Programa Académico</label>
            <input type="text" id="ee-programa" placeholder="Ej: Maestría en Tecnologías" />
          </div>

          <!-- Área y Línea de Investigación (Ahora con más espacio) -->
          <div class="form-row-flex">
            <div class="form-group flex-1">
              <label>Área</label>
              <input type="text" id="ee-area" placeholder="Ej: Computación" />
            </div>
            <div class="form-group flex-1">
              <label>Línea de Investigación</label>
              <input type="text" id="ee-linea" placeholder="Ej: IA Aplicada" />
            </div>
          </div>

        </div>

        <!-- COLUMNA DERECHA: Créditos y Horas -->
        <div class="ee-col-right">
          
          <!-- 🔹 CRÉDITOS -->
          <div class="ee-section-card">
            <div class="section-header">
              <i class="fa-solid fa-calculator"></i>
              <span>Créditos (Desglose)</span>
            </div>
            
            <div class="creditos-grid">
              <div class="creditos-item">
                <label>Teoría</label>
                <input type="number" id="ee-creditos-teoria" value="0" min="0" class="creditos-componente" />
              </div>
              <div class="creditos-item">
                <label>Práctica</label>
                <input type="number" id="ee-creditos-practica" value="0" min="0" class="creditos-componente" />
              </div>
              <div class="creditos-item">
                <label>Otros</label>
                <input type="number" id="ee-creditos-otros" value="0" min="0" class="creditos-componente" />
              </div>
            </div>

            <div class="creditos-total">
              <span>Total de Créditos</span>
              <span id="ee-creditos-total" class="creditos-total-value">0</span>
            </div>
            <input type="hidden" id="ee-creditos" />
          </div>

          <!-- 🔹 HORAS -->
          <div class="ee-section-card">
            <div class="section-header">
              <i class="fa-regular fa-clock"></i>
              <span>Horas Semanales</span>
            </div>
            
            <div class="form-row-flex">
              <div class="form-group flex-1">
                <label>Hrs. Teoría</label>
                <input type="number" id="ee-h-teoria" value="0" min="0" />
              </div>
              <div class="form-group flex-1">
                <label>Hrs. Práctica</label>
                <input type="number" id="ee-h-practica" value="0" min="0" />
              </div>
            </div>
          </div>

        </div>
      </div>
    </form>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn btn-cancel" id="btn-cancelar-ee">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-ee">Guardar EE</button>
    </div>
  </div>
</div>
