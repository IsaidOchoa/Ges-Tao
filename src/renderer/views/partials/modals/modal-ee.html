<!-- MODAL PERIODO ESCOLAR -->
<div id="modal-periodo" class="modal-overlay hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modal-titulo-periodo">Nuevo Periodo Escolar</h3>
      <button class="btn-close" onclick="cerrarModal('modal-periodo')">&times;</button>
    </div>
    
    <div class="modal-body">
      <form id="form-periodo">
        <input type="hidden" id="periodo-id">
        
        <!-- Plantilla de Periodo -->
        <div class="form-group">
          <label>Plantilla *</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="plantilla" value="semestre-a" checked 
                     onchange="class="btn btn-secondary btn-cancel" onclick="cerrarModal.onPlantillaChange()">
              <span class="radio-label">
                <strong>Semestre A</strong>
                <small>Feb - Jul</small>
              </span>
            </label>
            
            <label class="radio-option">
              <input type="radio" name="plantilla" value="semestre-b" 
                     onchange="class="btn btn-secondary btn-cancel" onclick="cerrarModal.onPlantillaChange()">
              <span class="radio-label">
                <strong>Semestre B</strong>
                <small>Ago - Ene</small>
              </span>
            </label>
            
            <label class="radio-option">
              <input type="radio" name="plantilla" value="personalizado" 
                     onchange="class="btn btn-secondary btn-cancel" onclick="cerrarModal.onPlantillaChange()">
              <span class="radio-label">
                <strong>Personalizado</strong>
                <small>Fechas manuales</small>
              </span>
            </label>
          </div>
        </div>
        
        <!-- Año Base (siempre visible) -->
        <div class="form-row-flex">
          <div class="form-group flex-1">
            <label>Año Base *</label>
            <select id="periodo-anio" name="anio_base" 
                    onchange="class="btn btn-secondary btn-cancel" onclick="cerrarModal.onAnioChange()">
              <!-- Se llena dinámicamente -->
            </select>
          </div>
          
          <div class="form-group flex-1">
            <label>Clave (Automática)</label>
            <input type="text" id="periodo-clave" name="clave" 
                   class="form-control-readonly" readonly>
          </div>
        </div>
        
        <!-- Fechas (solo visible si es Personalizado) -->
        <div id="section-fechas" class="hidden">
          <div class="form-row-flex">
            <div class="form-group flex-1">
              <label>Fecha Inicio *</label>
              <input type="date" id="periodo-fecha-inicio" name="fecha_inicio">
            </div>
            <div class="form-group flex-1">
              <label>Fecha Fin *</label>
              <input type="date" id="periodo-fecha-fin" name="fecha_fin">
            </div>
          </div>
        </div>
        
        <!-- Descripción -->
        <div class="form-group">
          <label>Descripción *</label>
          <input type="text" id="periodo-descripcion" name="descripcion" 
                 placeholder="Se genera automáticamente">
        </div>
        
        <!-- Estado -->
        <div class="form-group">
          <label>Estado</label>
          <select id="periodo-estado" name="estado">
            <option value="abierto">Abierto</option>
            <option value="cerrado">Cerrado</option>
            <option value="proceso">En Proceso</option>
          </select>
        </div>
        
        <!-- Vista Previa -->
        <div class="form-group preview-section">
          <label style="font-size: 0.85rem; color: var(--text-muted);">Vista previa:</label>
          <div id="periodo-preview" class="preview-box">
            <strong id="preview-text">-</strong>
          </div>
        </div>
        
      </form>
    </div>
    
    <div class="modal-footer">
      <button class="btn btn-secondary btn-cancel" onclick="cerrarModal('modal-periodo')">
        Cancelar
      </button>
      <button class="btn btn-primary" id="btn-guardar-periodo">
        Guardar Periodo
      </button>
    </div>
  </div>
</div>
