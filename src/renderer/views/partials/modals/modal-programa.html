<!-- MODAL PROGRAMA -->
<div id="modal-programa" class="modal-overlay hidden">
  <div class="modal-content smaller">
    <div class="modal-header">
      <h3>Nuevo Programa Institucional</h3>
      <button class="btn-close" onclick="cerrarModal('modal-programa')">&times;</button>
    </div>
    <div class="modal-body">
      <form id="form-programa">
        <input type="hidden" id="prog-id">
        <div class="form-group">
          <label>Nombre *</label>
          <input type="text" id="prog-nombre" required placeholder="Ej. PRODEP">
        </div>
        <div class="form-group">
          <label>Descripción</label>
          <textarea id="prog-desc" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Responsable</label>
          <input type="text" id="prog-resp" placeholder="Nombre del responsable">
        </div>
        <div class="form-group">
          <label>Fecha Registro</label>
          <input type="date" id="prog-fecha">
        </div>
        <div class="form-group">
          <label>Estado</label>
          <select id="prog-estado">
            <option value="vigente">Vigente</option><option value="finalizado">Finalizado</option>
          </select>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="cerrarModal('modal-programa')">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-programa">Guardar</button>
    </div>
  </div>
</div>
