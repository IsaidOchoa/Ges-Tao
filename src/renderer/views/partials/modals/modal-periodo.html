<!-- MODAL PERIODO - Layout Corregido UX -->
<div id="modal-periodo" class="modal-overlay hidden">
  <div class="modal-content modal-periodo-2col">
    <!-- Header -->
    <div class="modal-header">
      <h3>Nuevo Periodo Escolar</h3>
      <button class="btn-close" id="btn-cerrar-modal-periodo">&times;</button>
    </div>

    <form id="form-periodo">
      <input type="hidden" id="periodo-id" />

      <!-- GRID DE 2 COLUMNAS -->
      <div class="periodo-grid-2col">
        <!-- COLUMNA IZQUIERDA: Plantillas (Full Width) -->
        <div class="periodo-col-left">
          <label class="form-label">Tipo de Periodo</label>

          <div class="template-options-vertical">
            <label class="template-card-full">
              <input type="radio" name="plantilla" value="semestre-a" checked />
              <div class="template-card-content">
                <div class="radio-custom"></div>
                <div class="template-info">
                  <strong>Feb - Jul</strong>
                  <small>Mismo año</small>
                </div>
              </div>
            </label>

            <label class="template-card-full">
              <input type="radio" name="plantilla" value="semestre-b" />
              <div class="template-card-content">
                <div class="radio-custom"></div>
                <div class="template-info">
                  <strong>Ago - Ene</strong>
                  <small>Cruza años</small>
                </div>
              </div>
            </label>

            <label class="template-card-full">
              <input type="radio" name="plantilla" value="personalizado" />
              <div class="template-card-content">
                <div class="radio-custom"></div>
                <div class="template-info">
                  <strong>Personalizado</strong>
                  <small>Fechas manuales</small>
                </div>
              </div>
            </label>
          </div>
        </div>

        <!-- COLUMNA DERECHA: Campos -->
        <div class="periodo-col-right">
          <!-- CAMPOS PRINCIPALES -->
          <div class="form-row-flex">
            <!-- Año Base -->
            <div class="form-group flex-1">
              <label>Año Base *</label>
              <select id="periodo-anio-base" class="form-select"></select>
            </div>
            <!-- Clave Generada (Visual Badge) -->
            <div class="form-group flex-2">
              <label>Clave del Periodo</label>
              <div class="clave-badge-container">
                <span class="clave-badge" id="display-clave">FEB-JUL26</span>
              </div>
              <input type="hidden" id="periodo-clave" />
            </div>
          </div>

          <!-- FECHAS PERSONALIZADAS (Solo modo personalizado) -->
          <div
            id="section-fechas-personalizadas"
            class="custom-dates-section hidden"
          >
            <div class="section-alert">
              <i class="fa-solid fa-circle-info"></i>
              <span>Modo personalizado: define manualmente las fechas</span>
            </div>
            <div class="form-row-flex">
              <div class="form-group flex-1">
                <label>Fecha de Inicio *</label>
                <input
                  type="date"
                  id="periodo-fecha-inicio"
                  class="form-control"
                />
              </div>
              <div class="form-group flex-1">
                <label>Fecha de Fin *</label>
                <input
                  type="date"
                  id="periodo-fecha-fin"
                  class="form-control"
                />
              </div>
            </div>
          </div>

          <!-- FECHAS AUTOMÁTICAS (Visualización para plantillas) -->
          <div id="section-fechas-automaticas" class="auto-dates-section">
            <div class="form-row-flex">
              <div class="form-group flex-1">
                <label>Fecha de Inicio</label>
                <div class="date-display" id="display-fecha-inicio">
                  01/02/2026
                </div>
                <input type="hidden" id="periodo-fecha-inicio-hidden" />
              </div>
              <div class="form-group flex-1">
                <label>Fecha de Fin</label>
                <div class="date-display" id="display-fecha-fin">
                  31/07/2026
                </div>
                <input type="hidden" id="periodo-fecha-fin-hidden" />
              </div>
            </div>
          </div>

          <!-- 🔹 CHECKBOX: Vigencia Forzada (Minimalista) -->
          <div
            class="form-group"
            style="
              margin-top: 15px;
              padding: 10px;
              background: rgba(0, 0, 0, 0.02);
              border-radius: var(--radius-sm);
              border-left: 3px solid var(--accent-color);
            "
          >
            <div style="display: flex; align-items: center; gap: 10px">
              <input
                type="checkbox"
                id="chk-vigencia-forzada"
                value="1"
                style="width: auto; margin: 0"
              />
              <label
                for="chk-vigencia-forzada"
                style="margin: 0; font-weight: 500; cursor: pointer; flex: 1"
              >
                Forzar vigencia manual
              </label>
              <button
                type="button"
                id="btn-info-vigencia"
                class="btn-icon-info"
                style="
                  background: none;
                  border: none;
                  cursor: pointer;
                  padding: 5px;
                  color: var(--text-muted);
                  font-size: 1rem;
                "
              >
                <i class="fa-solid fa-circle-info"></i>
              </button>
            </div>
            <p
              id="vigencia-status-msg"
              class="help-text"
              style="
                margin: 5px 0 0 26px;
                font-size: 0.8rem;
                font-style: italic;
              "
            ></p>
          </div>

          <!-- PANEL DE ESTADO/VALIDACIÓN (Ahora al final) -->
          <div id="panel-estado" class="status-panel status-valid">
            <div class="status-icon">✓</div>
            <div class="status-content">
              <div class="status-title" id="status-title">Periodo válido</div>
              <div class="status-message" id="status-message">
                Listo para guardar
              </div>
            </div>
          </div>

          <!-- Campos ocultos -->
          <input type="hidden" id="periodo-descripcion" />
          <input type="hidden" id="periodo-estado" value="abierto" />
        </div>
      </div>
    </form>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn btn-cancel" id="btn-cancelar-periodo">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-periodo">
        Guardar Periodo
      </button>
    </div>
  </div>
</div>
