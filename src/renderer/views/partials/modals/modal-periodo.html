<!-- MODAL PERIODO ESCOLAR - Layout 2 Columnas -->
<div id="modal-periodo" class="modal-overlay hidden">
  <div class="modal-content modal-periodo-lg">
    
    <!-- Header -->
    <div class="modal-header">
      <h3 id="modal-titulo-periodo">Nuevo Periodo Escolar</h3>
      <button class="btn-close" id="btn-cerrar-modal-periodo">&times;</button>
    </div>
    
    <!-- Formulario en 2 columnas -->
    <form id="form-periodo">
      <input type="hidden" id="periodo-id">
      
      <div class="periodo-grid">
        
        <!-- COLUMNA IZQUIERDA: Plantillas -->
        <div class="periodo-col-left">
          <label style="font-weight:600; margin-bottom:12px; display:block; color:var(--text-dark);">
            Plantillas *
          </label>
          
          <div class="template-options-vertical">
            
            <label class="template-card-option">
              <input type="radio" name="plantilla" value="semestre-a" checked>
              <div class="template-card-content">
                <div class="template-radio-indicator"></div>
                <div class="template-info">
                  <strong>Semestre A</strong>
                  <small>Feb - Jul (mismo año)</small>
                </div>
              </div>
            </label>
            
            <label class="template-card-option">
              <input type="radio" name="plantilla" value="semestre-b">
              <div class="template-card-content">
                <div class="template-radio-indicator"></div>
                <div class="template-info">
                  <strong>Semestre B</strong>
                  <small>Ago - Ene (cruza años)</small>
                </div>
              </div>
            </label>
            
            <label class="template-card-option">
              <input type="radio" name="plantilla" value="personalizado">
              <div class="template-card-content">
                <div class="template-radio-indicator"></div>
                <div class="template-info">
                  <strong>Personalizado</strong>
                  <small>Configuración manual de fechas</small>
                </div>
              </div>
            </label>
            
          </div>
        </div>
        
        <!-- COLUMNA DERECHA: Campos -->
        <div class="periodo-col-right">
          
          <!-- Año Base y Clave -->
          <div class="form-row-flex">
            <div class="form-group flex-1">
              <label>Año Base *</label>
              <select id="periodo-anio-base">
                <!-- Se llena dinámicamente -->
              </select>
            </div>
            <div class="form-group flex-2">
              <label>Clave Generada</label>
              <input type="text" id="periodo-clave" readonly 
                     class="form-control-readonly"
                     placeholder="Ej: FEB-JUL24">
            </div>
          </div>
          
          <!-- Fechas (Solo en modo personalizado) -->
          <div id="section-fechas" class="fechas-section hidden">
            <label style="font-size:0.85rem; color:var(--text-muted); margin-bottom:8px; display:block;">
              Fechas Personalizadas *
            </label>
            <div class="form-row-flex">
              <div class="form-group flex-1">
                <label style="font-size:0.8rem;">Inicio</label>
                <input type="date" id="periodo-fecha-inicio">
              </div>
              <div class="form-group flex-1">
                <label style="font-size:0.8rem;">Fin</label>
                <input type="date" id="periodo-fecha-fin">
              </div>
            </div>
          </div>
          
          <!-- Descripción -->
          <div class="form-group">
            <label>Descripción *</label>
            <input type="text" id="periodo-descripcion" required 
                   class="form-control-readonly"
                   placeholder="Se genera automáticamente" readonly>
          </div>
          
          <!-- Vista Previa -->
          <div class="periodo-preview-box">
            <small class="preview-label">Vista previa:</small>
            <div class="preview-content">
              <strong id="preview-descripcion">-</strong>
              <span id="preview-duracion" class="preview-badge">✓ Válido</span>
            </div>
          </div>
          
        </div>
      </div>
    </form>
    
    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn btn-cancel" id="btn-cancelar-periodo">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-periodo">Guardar Periodo</button>
    </div>
    
  </div>
</div>
