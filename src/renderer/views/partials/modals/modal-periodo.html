<!-- src/renderer/views/partials/modals/modal-periodo.html -->
<div id="modal-periodo" class="modal-overlay hidden">
  <div class="modal-content modal-lg">
    
    <!-- Header -->
    <div class="modal-header">
      <h3 id="modal-titulo-periodo">Nuevo Periodo Escolar</h3>
      <button class="btn-close" id="btn-cerrar-modal-periodo">&times;</button>
    </div>
    
    <!-- Formulario -->
    <form id="form-periodo">
      <input type="hidden" id="per-id">
      
      <!-- 🔹 Plantilla de Periodo (Selección guiada) -->
      <div class="form-group">
        <label>Plantilla de Periodo *</label>
        <div class="template-selector">
          <label class="template-option">
            <input type="radio" name="plantilla" value="semestre-a" checked onchange="periodoModuleInstance.actualizarFechasDesdePlantilla()">
            <div class="template-card">
              <strong>Semestre A</strong>
              <small>Feb - Jul (5 meses)</small>
            </div>
          </label>
          <label class="template-option">
            <input type="radio" name="plantilla" value="semestre-b" onchange="periodoModuleInstance.actualizarFechasDesdePlantilla()">
            <div class="template-card">
              <strong>Semestre B</strong>
              <small>Ago - Ene (4 meses)</small>
            </div>
          </label>
          <label class="template-option">
            <input type="radio" name="plantilla" value="personalizado" onchange="periodoModuleInstance.activarModoPersonalizado()">
            <div class="template-card">
              <strong>Personalizado</strong>
              <small>Configuración manual *</small>
            </div>
          </label>
        </div>
      </div>

      <!-- 🔹 Año Base (para plantillas) -->
      <div class="form-row-flex" id="row-ano-base">
        <div class="form-group flex-1">
          <label>Año Base *</label>
          <select id="per-ano-base" onchange="periodoModuleInstance.actualizarFechasDesdePlantilla()">
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
            <option value="2027">2027</option>
          </select>
        </div>
        <div class="form-group flex-2">
          <label>Clave Generada (Automática)</label>
          <input type="text" id="per-clave-preview" readonly 
                 style="background:var(--bg-light); font-family:monospace; font-weight:600; color:var(--accent-color);"
                 placeholder="Ej: FEB-JUL24">
        </div>
      </div>

      <!-- 🔹 Fechas (Solo visibles en modo personalizado o para ajuste fino) -->
      <div class="form-row-flex" id="row-fechas">
        <div class="form-group flex-1">
          <label>Fecha de Inicio *</label>
          <input type="date" id="per-inicio" required onchange="periodoModuleInstance.actualizarClaveManual()">
        </div>
        <div class="form-group flex-1">
          <label>Fecha de Fin *</label>
          <input type="date" id="per-fin" required onchange="periodoModuleInstance.validarYActualizarClave()">
        </div>
      </div>

      <!-- 🔹 Validación en tiempo real -->
      <div id="periodo-validation" class="form-feedback hidden" style="margin-top:-15px; margin-bottom:15px;">
        <!-- Se llena dinámicamente -->
      </div>

      <!-- 🔹 Descripción y Estado -->
      <div class="form-row-flex">
        <div class="form-group flex-3">
          <label>Descripción *</label>
          <input type="text" id="per-desc" required placeholder="Ej: Periodo Escolar Febrero - Julio 2024">
        </div>
        <div class="form-group flex-1">
          <label>Estado</label>
          <select id="per-estado">
            <option value="abierto">Abierto</option>
            <option value="en_progreso">En Progreso</option>
            <option value="cerrado">Cerrado</option>
          </select>
        </div>
      </div>

      <!-- 🔹 Preview de Periodo (Visual) -->
      <div class="periodo-preview" style="background:var(--bg-light); padding:12px 15px; border-radius:var(--radius-sm); margin-top:10px;">
        <small style="color:var(--text-muted); display:block; margin-bottom:5px;">Vista previa:</small>
        <strong id="preview-descripcion" style="color:var(--text-dark);">FEB-JUL24: Febrero - Julio 2024</strong>
        <span id="preview-duracion" style="margin-left:10px; font-size:0.85rem; color:var(--success-color);">✓ 5 meses</span>
      </div>
    </form>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn btn-cancel" id="btn-cancelar-periodo">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-periodo">Guardar Periodo</button>
    </div>
    
  </div>
</div>
