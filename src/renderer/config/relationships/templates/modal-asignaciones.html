<!-- modal-asignaciones.html (v2.0) -->
<div id="modal-asignaciones" class="modal-overlay hidden">
  <div class="modal-content">
    <!-- TOPBAR -->
    <header class="modal-topbar">
      <div class="topbar-left">
        <h2>Gestión Académica</h2>
        <span class="topbar-subtitle">Workspace contextual de relaciones</span>
      </div>
      <div class="topbar-right">
        <button id="btn-close-modal" class="btn-icon-close" aria-label="Cerrar">
          &times;
        </button>
      </div>
    </header>

    <!-- MAIN LAYOUT -->
    <div class="modal-main-layout">
      <!-- SIDEBAR -->
      <aside class="modal-sidebar">
        <div class="sidebar-body">
          <!-- 1. CONTEXTO DE ENTIDAD -->
          <section class="context-section">
            <div id="ctx-context-info" class="context-info"></div>
          </section>

          <!-- 2. SELECTOR DE PERIODO ACTIVO -->
          <section class="context-section">
            <div class="section-label">Contexto activo</div>
            <div class="sidebar-controls">
              <label class="control-label">Periodo académico</label>
              <select id="ctx-period-selector" class="form-select">
                <option value="">Todos los periodos (Histórico)</option>
              </select>
            </div>
          </section>

          <!-- 3. PANEL DE ESTADO RELACIONAL (NUEVO v2.0) -->
          <div id="sidebar-relations-panel"></div>
        </div>

        <!-- FOOTER -->
        <div class="sidebar-footer">
          <button class="btn btn-secondary btn-block" id="btn-cancelar-asig">
            Cerrar workspace
          </button>
        </div>
      </aside>

      <!-- WORKSPACE -->
      <main class="modal-workspace">
        <!-- NAV -->
        <nav class="workspace-nav" id="workspace-tabs">
          <button class="tab-btn active" data-tab="gestionar">
            <i class="fa-solid fa-screwdriver-wrench"></i> Gestionar
          </button>
          <button class="tab-btn" data-tab="consultar">
            <i class="fa-solid fa-book-open"></i> Consultar
          </button>
        </nav>

        <!-- BODY (Estructura v2.0: Estado vs Acciones) -->
        <section id="workspace-content" class="workspace-body">
          <!-- SECCIÓN 1: Adhesión a Periodos -->
          <div
            class="workspace-section section-period-adhesion"
            id="section-period-adhesion"
          >
            <div class="section-header">
              <h4>Periodos disponibles para asignar</h4>
            </div>

            <!-- Controles (Arriba) -->
            <div class="adhesion-controls">
              <select
                id="adhesion-period-select"
                class="form-select form-select-sm"
              >
                <option value="">Seleccionar periodo...</option>
              </select>
              <button class="btn btn-sm btn-primary" id="btn-add-adhesion">
                <i class="fa-solid fa-plus"></i> Asignar
              </button>
            </div>

            <!-- Lista de chips (Abajo - ESTO ES LO QUE FALTABA) -->
            <div class="adhesion-list" id="adhesion-list">
              <span class="adhesion-item empty">Sin periodos asignados</span>
            </div>
          </div>

          <!-- SECCIÓN INFERIOR: Relaciones Operativas (Requiere periodo activo) -->
          <div
            class="workspace-section section-operational-relations"
            id="section-operational-relations"
          >
            <div class="section-header">
              <h4>Relaciones Operativas</h4>
            </div>

            <!-- Grid de cards de acción -->
            <div class="workspace-grid" id="operational-relations-grid"></div>

            <!-- Overlay de bloqueo sin periodo -->
            <div class="relations-overlay hidden" id="relations-overlay">
              <div class="overlay-content">
                <i class="fa-solid fa-circle-info"></i>
                <p>
                  Seleccione un periodo académico para habilitar las relaciones
                  operativas
                </p>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>
</div>
