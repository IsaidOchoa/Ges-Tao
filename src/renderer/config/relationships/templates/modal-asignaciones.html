<!-- modal-asignaciones.html (v2.2 - Limpio) -->
<div id="modal-asignaciones" class="modal-overlay hidden">
  <div class="modal-content">
    <!-- TOPBAR -->
    <header class="modal-topbar">
      <div class="topbar-left">
        <h2>Gestión Académica</h2>
        <span class="topbar-subtitle">Cree nuevas relaciones</span>
      </div>
      <div class="topbar-right">
        <button id="btn-close-modal" class="btn-icon-close" aria-label="Cerrar">&times;</button>
      </div>
    </header>

    <!-- MAIN LAYOUT -->
    <div class="modal-main-layout">
      <!-- SIDEBAR (Aquí vive la gestión de periodos) -->
      <aside class="modal-sidebar">
        <div class="sidebar-body">
          <!-- 1. Contexto de Entidad -->
          <section class="context-section">
            <div id="ctx-context-info" class="context-info"></div>
          </section>

          <!-- 2. Selector de Periodo Activo -->
          <section class="context-section">
            <div class="section-label">Contexto activo</div>
            <div class="sidebar-controls">
              <label class="control-label">Periodo académico</label>
              <select id="ctx-period-selector" class="form-select">
                <option value="">Filtrar por periodos</option>
              </select>
            </div>
          </section>

          <!-- 3. Panel de Estado Relacional -->
          <div id="sidebar-relations-panel"></div>
          
          <!-- 4. Gestión de Periodos (Chips y agregar) -->
          <!-- Este contenedor debe estar en tu Sidebar, no en el workspace -->
          <div id="sidebar-periods-manager" class="sidebar-periods-manager" style="margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 15px;">
             <!-- JS inyecta aquí los chips y el botón de engranaje -->
          </div>
        </div>

        <div class="sidebar-footer">
          <button class="btn btn-secondary btn-block" id="btn-cancelar-asig">Cerrar workspace</button>
        </div>
      </aside>

      <!-- WORKSPACE -->
      <main class="modal-workspace">
        <!-- TABS PRINCIPALES -->
        <nav class="workspace-nav" id="workspace-tabs">
          <button class="tab-btn active" data-tab="gestionar">
            <i class="fa-solid fa-screwdriver-wrench"></i> Gestionar
          </button>
          <button class="tab-btn" data-tab="consultar">
            <i class="fa-solid fa-book-open"></i> Consultar
          </button>
        </nav>

        <!-- BODY -->
        <section id="workspace-content" class="workspace-body">
          <!-- VIEW: GESTIONAR -->
          <div id="view-gestionar" class="workspace-view">
            
            <!-- SECCIÓN: RELACIONES OPERATIVAS -->
            <div class="workspace-section section-operational-relations" id="section-operational-relations">
              
              <!-- NUEVO: Tabs internos (EE / Tutorados) -->
              <nav class="option-tabs" id="option-tabs">
                <button class="option-tab-btn active" data-option="ee_asignadas">
                  <i class="fa-solid fa-book-open"></i> Experiencias Educativas
                </button>
                <button class="option-tab-btn" data-option="tutorados">
                  <i class="fa-solid fa-user-graduate"></i> Tutorados
                </button>
              </nav>

              <!-- Contenido dinámico -->
              <div id="option-content" class="option-content">
                <!-- JS inyecta la card de asignación aquí -->
              </div>

              <!-- Overlay sin periodo -->
              <div class="relations-overlay hidden" id="relations-overlay">
                <div class="overlay-content">
                  <i class="fa-solid fa-circle-info"></i>
                  <p>Seleccione un periodo académico para habilitar las relaciones operativas</p>
                </div>
              </div>

            </div>
          </div>

          <!-- VIEW: CONSULTAR -->
          <div id="view-consultar" class="workspace-view hidden"></div>
        </section>
      </main>
    </div>
  </div>
</div>
